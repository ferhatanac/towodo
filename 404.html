<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Towodo — Page Moved</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230E1E35'/><rect x='15' y='58' width='20' height='22' rx='2' fill='%23C08038'/><rect x='40' y='40' width='20' height='40' rx='2' fill='%23D89040'/><rect x='65' y='18' width='20' height='62' rx='2' fill='%23E8A040'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <meta http-equiv="refresh" content="0;url=https://towodo.com/">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--navy-deep:#060E18;--amber:#D88C3C;--amber-light:#E8A040;--amber-glow:#F0C870;--text-primary:#F0EAE0;--text-secondary:#B0A898;--text-dim:#887E70}
        body{font-family:'DM Sans',sans-serif;background:var(--navy-deep);color:var(--text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
        .wrap{max-width:480px}
        .logo{width:80px;height:80px;margin:0 auto 32px;opacity:0;animation:fadeUp 0.8s ease-out 0.2s forwards}
        h1{font-size:28px;font-weight:400;margin-bottom:12px;opacity:0;animation:fadeUp 0.8s ease-out 0.4s forwards}
        h1 em{font-style:normal;color:var(--amber-glow)}
        p{font-size:15px;font-weight:300;line-height:1.6;color:var(--text-secondary);margin-bottom:24px;opacity:0;animation:fadeUp 0.8s ease-out 0.6s forwards}
        .btn{display:inline-block;background:linear-gradient(135deg,var(--amber),var(--amber-light));color:var(--navy-deep);text-decoration:none;padding:14px 32px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;letter-spacing:0.5px;transition:transform 0.2s,box-shadow 0.3s;opacity:0;animation:fadeUp 0.8s ease-out 0.8s forwards}
        .btn:hover{transform:scale(1.03);box-shadow:0 4px 20px rgba(216,140,60,0.3)}
        .countdown{font-size:12px;color:var(--text-dim);margin-top:16px;font-weight:300;opacity:0;animation:fadeUp 0.8s ease-out 1s forwards}
        @keyframes fadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
    </style>
</head>
<body>
    <div class="wrap">
        <div class="logo">
            <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="lbg" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#0A1520"/><stop offset="50%" stop-color="#0E1E35"/><stop offset="100%" stop-color="#142848"/></linearGradient>
                    <linearGradient id="lb1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#C08038"/><stop offset="100%" stop-color="#8A5A25"/></linearGradient>
                    <linearGradient id="lb2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#D89040"/><stop offset="100%" stop-color="#A87028"/></linearGradient>
                    <linearGradient id="lb3" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#E8A040"/><stop offset="100%" stop-color="#C88030"/></linearGradient>
                </defs>
                <circle cx="200" cy="200" r="196" fill="url(#lbg)"/>
                <rect x="80" y="234" width="72" height="76" rx="5" fill="url(#lb1)"/>
                <rect x="164" y="187" width="72" height="123" rx="5" fill="url(#lb2)"/>
                <rect x="248" y="111" width="72" height="199" rx="5" fill="url(#lb3)"/>
            </svg>
        </div>
        <h1>Towodo is <em>evolving</em></h1>
        <p>This page has moved. Towodo is now an AI-powered goal achievement platform. We're launching soon — join the waitlist!</p>
        <a href="https://towodo.com/" class="btn">Go to Towodo →</a>
        <p class="countdown">Redirecting automatically in a few seconds...</p>
    </div>
</body>
</html>
